<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5B52E0"/>
      <stop offset="100%" stop-color="#8B7FFF"/>
    </linearGradient>
    <!-- Heart -->
    <linearGradient id="heart" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B9D"/>
      <stop offset="100%" stop-color="#FF8E53"/>
    </linearGradient>
    <!-- Glow effects -->
    <filter id="rainbowGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feComposite in="blur" operator="over"/>
    </filter>
    <filter id="heartGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)"/>
  <!-- Subtle top-left light -->
  <circle cx="200" cy="200" r="200" fill="white" opacity="0.035"/>

  <!-- ===== RAINBOW GLOW (behind) ===== -->
  <g opacity="0.3" filter="url(#rainbowGlow)">
    <path d="M 104 316 A 152 152 0 0 1 408 316" stroke="#FFD93D" stroke-width="14" stroke-linecap="round" fill="none"/>
    <path d="M 121 316 A 135 135 0 0 1 391 316" stroke="#FF9A3D" stroke-width="14" stroke-linecap="round" fill="none"/>
    <path d="M 138 316 A 118 118 0 0 1 374 316" stroke="#FF6B9D" stroke-width="14" stroke-linecap="round" fill="none"/>
    <path d="M 155 316 A 101 101 0 0 1 357 316" stroke="#A29BFE" stroke-width="14" stroke-linecap="round" fill="none"/>
    <path d="M 172 316 A 84 84 0 0 1 340 316" stroke="#74B9FF" stroke-width="14" stroke-linecap="round" fill="none"/>
  </g>

  <!-- ===== RAINBOW BANDS (5 separated arcs) ===== -->
  <!-- Band 1 - Yellow (outer, happy) -->
  <path d="M 104 316 A 152 152 0 0 1 408 316"
        stroke="#FFD93D" stroke-width="14" stroke-linecap="round" fill="none"/>
  <!-- Band 2 - Orange (warmth) -->
  <path d="M 121 316 A 135 135 0 0 1 391 316"
        stroke="#FF9A3D" stroke-width="14" stroke-linecap="round" fill="none"/>
  <!-- Band 3 - Pink (love) -->
  <path d="M 138 316 A 118 118 0 0 1 374 316"
        stroke="#FF6B9D" stroke-width="14" stroke-linecap="round" fill="none"/>
  <!-- Band 4 - Lavender (calm) -->
  <path d="M 155 316 A 101 101 0 0 1 357 316"
        stroke="#A29BFE" stroke-width="14" stroke-linecap="round" fill="none"/>
  <!-- Band 5 - Sky blue (inner, peaceful) -->
  <path d="M 172 316 A 84 84 0 0 1 340 316"
        stroke="#74B9FF" stroke-width="14" stroke-linecap="round" fill="none"/>

  <!-- ===== HEART AT APEX ===== -->
  <path d="M256 166
           C249 166 222 152 222 134
           C222 116 240 106 256 124
           C272 106 290 116 290 134
           C290 152 263 166 256 166Z"
        fill="url(#heart)" filter="url(#heartGlow)"/>
  <!-- Heart inner shine -->
  <ellipse cx="242" cy="128" rx="9" ry="6" fill="white" opacity="0.35" transform="rotate(-20 242 128)"/>

  <!-- ===== SPARKLE ACCENTS ===== -->
  <!-- Star near heart -->
  <path d="M308 118 L310 110 L312 118 L320 120 L312 122 L310 130 L308 122 L300 120Z"
        fill="white" opacity="0.5"/>
  <!-- Dots -->
  <circle cx="196" cy="130" r="3" fill="white" opacity="0.45"/>
  <circle cx="340" cy="188" r="2.5" fill="white" opacity="0.35"/>
  <circle cx="152" cy="230" r="2" fill="white" opacity="0.25"/>
  <circle cx="370" cy="248" r="2" fill="white" opacity="0.3"/>
  <circle cx="256" cy="100" r="2" fill="white" opacity="0.4"/>
  <!-- Small star top-right -->
  <path d="M360 144 L361 140 L362 144 L366 145 L362 146 L361 150 L360 146 L356 145Z"
        fill="white" opacity="0.35"/>

  <!-- ===== TEXT ===== -->
  <text x="256" y="388" text-anchor="middle" fill="white" font-family="'Be Vietnam Pro', 'Segoe UI', sans-serif" font-size="44" font-weight="700" letter-spacing="1">MoodBridge</text>
  <text x="256" y="422" text-anchor="middle" fill="white" opacity="0.7" font-family="'Be Vietnam Pro', 'Segoe UI', sans-serif" font-size="17" font-weight="400" letter-spacing="2.5">Cầu Nối Tâm Trạng</text>
</svg>
