name: moodbridge
description: "MoodBridge - Cầu Nối Tâm Trạng. Connect happy people with sad people through anonymous encouragement."
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  firebase_storage: ^13.0.6
  firebase_messaging: ^16.1.1
  firebase_analytics: ^12.1.2

  # State Management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # Navigation
  go_router: ^17.1.0

  # UI Components
  flutter_animate: ^4.5.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  gap: ^3.0.1
  
  # Icons (NO EMOJI!)
  lucide_icons: ^0.257.0
  
  # Forms
  flutter_form_builder: ^10.3.0
  form_builder_validators: ^11.1.0

  # Utils
  intl: ^0.20.2
  timeago: ^3.7.0
  uuid: ^4.5.1
  
  # Storage
  shared_preferences: ^2.3.5
  
  # Google Fonts
  google_fonts: ^8.0.2

  cupertino_icons: ^1.0.8
  flutter_local_notifications: ^20.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.0+1
  build_runner: ^2.4.14
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
